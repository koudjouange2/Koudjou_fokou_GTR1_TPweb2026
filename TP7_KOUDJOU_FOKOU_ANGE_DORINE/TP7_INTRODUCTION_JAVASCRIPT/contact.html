<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initiale-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact-mini-site</title>

</head>
<body>
    <div class="page"
    <header>
   <h1> Page de contact</h1> 
   </header>
   <nav> 
    <a href="index.html">Accueil</a>
    <a href="presentation.html">presentation</a>
    <a href="contact.html">contact</a>
   </nav>
   <div class="container">
   <main>
   <h2> formulairede contact</h2>
   <p> veuillez remplir ce formulairepour envoyer un message</p>
   <form>
    <label for="nom">Nom :</label>
    <input type="text" id="nom" name="nom" placeholder="Entrez votre nom" required>
    <br>
    <br>
    <label for="prénom">Prénom :</label>
    <input type="text" id="prénom" name="prénom" placeholder="Entrez votre prénom" required>
    <br> 
    <br>
    <label for="email">Adresse email :</label>
        <input type="email" id="email" name="email" placeholder="exemple@email.com" required> 
        <br>
        <br>
        <label for="telephone">Téléphone :</label>
        <input type="tel" id="telephone" name="telephone" placeholder="+237 6 XX XX XX XX">
        <br>
        <br>
        <label for="domaine">Domaine d'intéret : </label>
        <select id="domaine" name="domaine" required>
            <option value=""></option>
            <option value="reseaux">Réseaux informatiques</option>
            <option value="cybersecurite">Cybersecurité</option>
            <option value="developpement-web">Developpement-web</option>
            <option value="administrateur-systeme">Administrateur systéme</option>
        </select>
        <br> 
        <br>
        <label for="mofif">Motif du message :</label>
        <select id="motif" name="motif" required>
            <option value=""></option>
            <option value="information">Demande d'information</option>
            <option value="Stage">Demande de stage</option>
            <option value="projet">Proposition de projet</option>
            <option value="autre">Autre demande</option>
        </select>
        <br>
        <br>
        <p> Statut du visiteur :</p>
        <input type="radio" id="etudiant" name="statut" value="etudiant"required>
        <label for="etudiant"> Etudiant</label>
        <br>
        <input type="radio" id="enseignant" name="statut" value="enseignant">
        <label for="enseignant" >Enseignant</label>
        <br>
        <input type="radio" id="professionnel" name="statut" value="professionnel">
        <label for="professionnel">Professionnel</label>
        <br>
        <br>
        <label for="message">Message :</label>
        <br>
        <textarea id="message" name="message " rows="5" cols="40"placeholder="Ecrivez votre message ici" required></textarea>
        <br>
        <br>
        <input type="checkbox" id="confirmation" name="confirmation" required>
        <lablel for="confirmation">Je confirme que les informations saisis sont correctes</lablel>
        <br>
        <br>
        <button type="submit">envoyer</button>
    
   </form>
   </main>
   </div>
   <footer>© 2026-Ma page de contact</footer>
   </div>
</body>
</html>
